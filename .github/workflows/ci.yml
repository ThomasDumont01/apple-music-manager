name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    # macOS required for pyobjc-framework-iTunesLibrary

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint (ruff)
        run: uv run ruff check music_manager/ tests/

      - name: Type check (pyright)
        run: uv run pyright music_manager/

      - name: Security (bandit)
        run: uv run bandit -r music_manager/ -ll -q

      - name: Tests (pytest)
        run: uv run pytest tests/ -q -m "not integration"
